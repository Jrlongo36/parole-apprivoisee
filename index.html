<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
    <title>La Parole Apprivoisée</title>
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#1a237e"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <link href="style.css" rel="stylesheet" />
</head>
<body>

    <div id="status-bar">
        <span id="user-name">Invité</span>
        <div class="progress-container">
            <div id="progress-bar-inner"></div>
        </div>
        <span id="star-count">⭐ 0</span>
    </div>

    <section id="screen-home" class="card" style="margin-top: 50px;">
        <h1 style="color: var(--primary);">La Parole Apprivoisée</h1>
        <p>Apprends à lire avec la Bible !</p>
        <button class="btn-add" onclick="creerEleve()">+ Ajouter un élève</button>
        <div id="liste-eleves" class="grid-menu"></div>
    </section>

    <section id="screen-lecture" class="card hidden" style="margin-top: 50px;">
        <h2 id="ref-verset" style="color: var(--primary);">Livre Chapitre:Verset</h2>
        <p id="texte-verset" style="font-size: 1.5rem; line-height: 2; text-align: left;"></p>
        <button class="btn-main" onclick="passerAuQuiz()" style="margin-top: 20px;">J'ai lu ! Jouons 🎯</button>
    </section>

    <section id="screen-quiz" class="card hidden" style="margin-top: 50px;">
        <h2>Trouve la bonne syllabe pour :</h2>
        <h1 id="mot-target" style="font-size: 3rem; margin: 20px 0;">...</h1>
        <div id="syllabes-choices" class="grid-menu" style="margin-top: 30px;"></div>
    </section>

    <script src="script.js"></script>
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(() => console.log('Service Worker enregistré avec succès.'))
            .catch(err => console.error('Erreur Service Worker:', err));
        });
      }
    </script>
</body>
</html>
