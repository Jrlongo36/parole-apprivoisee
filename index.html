<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Parole Apprivoisée PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="status-bar">
        <div id="user-info"><span id="user-name">Invité</span> | <span id="star-count">⭐ 0</span></div>
        <div class="progress-container"><div id="progress-bar-inner"></div></div>
    </nav>

    <main id="app">
        <section id="scr-accueil" class="active">
            <div class="card">
                <h1>Tableau de Bord</h1>
                <button class="btn-add" onclick="creerEleve()">+ Nouvel Élève</button>
                <div id="liste-eleves"></div>
            </div>
        </section>

        <section id="scr-livres" class="hidden">
            <h2>📜 Livres</h2>
            <div id="list-livres" class="grid-menu"></div>
        </section>

        <section id="scr-chapitres" class="hidden">
            <button class="btn-back" onclick="openScreen('scr-livres')">← Retour</button>
            <h2 id="titre-livre"></h2>
            <div id="list-chapitres" class="grid-num"></div>
        </section>

        <section id="scr-lecture" class="hidden">
            <div class="card">
                <h3 id="ref-label"></h3>
                <div id="text-display" class="verset-box"></div>
                
                <div id="step-1" class="step">
                    <button class="btn-main" onclick="lireVerset()">🔊 ÉCOUTER ET SUIVRE</button>
                </div>

                <div id="step-2" class="step hidden">
                    <p>Touche la syllabe manquante :</p>
                    <h3 id="word-hint"></h3>
                    <div id="syllabes-choices" class="syllabes-grid"></div>
                </div>

                <div id="step-3" class="step hidden">
                    <h3>✨ Bravo ! +20 ⭐</h3>
                    <button class="btn-main" onclick="prochainVerset()">SUIVANT ▶</button>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
