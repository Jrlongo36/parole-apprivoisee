<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2A1F6B" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>La Parole Apprivoisée</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>

<!-- ===== SPLASH SCREEN ===== -->
<div id="splash" class="screen active">
  <div class="splash-bg"></div>
  <div class="splash-content">
    <div class="app-cross">✝</div>
    <h1 class="app-title">La Parole<br/><span>Apprivoisée</span></h1>
    <p class="app-subtitle">Apprendre à lire avec la Bible</p>
    <div class="mode-choice">
      <button class="mode-btn child-btn" onclick="selectMode('enfant')" aria-label="Mode Enfant">
        <span class="mode-icon">🌟</span>
        <span class="mode-label">Enfant</span>
      </button>
      <button class="mode-btn adult-btn" onclick="selectMode('adulte')" aria-label="Mode Adulte">
        <span class="mode-icon">📖</span>
        <span class="mode-label">Adulte</span>
      </button>
    </div>
  </div>
</div>

<!-- ===== SÉLECTEUR LIVRE/CHAP/VERSET ===== -->
<div id="selector-screen" class="screen">
  <div class="selector-header">
    <button class="back-btn" onclick="goBack()" aria-label="Retour">←</button>
    <h2 id="selector-title">Choisir un passage</h2>
    <div class="progress-display">
      <span id="progress-stars">⭐</span>
      <span id="progress-count">0</span>
    </div>
  </div>

  <div class="selector-body">
    <!-- Étape 1 : Livre -->
    <div id="step-book" class="selector-step active">
      <p class="step-label">Choisir le Livre</p>
      <div class="search-box">
        <input type="text" id="book-search" placeholder="Chercher un livre…" oninput="filterBooks()" />
      </div>
      <div id="book-grid" class="book-grid"></div>
    </div>

    <!-- Étape 2 : Chapitre -->
    <div id="step-chapter" class="selector-step">
      <p class="step-label">Choisir le Chapitre</p>
      <p id="selected-book-name" class="selected-label"></p>
      <div id="chapter-grid" class="number-grid"></div>
    </div>

    <!-- Étape 3 : Verset -->
    <div id="step-verse" class="selector-step">
      <p class="step-label">Choisir le Verset</p>
      <p id="selected-chapter-name" class="selected-label"></p>
      <div id="verse-grid" class="number-grid"></div>
    </div>
  </div>
</div>

<!-- ===== ÉCRAN PRINCIPAL DE LECTURE ===== -->
<div id="reading-screen" class="screen">

  <div class="reading-header">
    <button class="icon-btn" onclick="openSelector()" title="Changer de passage">☰</button>
    <div class="reference-display">
      <span id="ref-book"></span> <span id="ref-chap"></span>:<span id="ref-verse"></span>
    </div>
    <button class="icon-btn" onclick="openPastorView()" title="Tableau pasteur">👁</button>
  </div>

  <!-- Carte du verset -->
  <div class="verse-stage">
    <div class="verse-card" id="verse-card">
      <div class="verse-ref-badge" id="verse-ref-badge"></div>
      <div id="verse-words" class="verse-words"></div>
      <div class="verse-controls">
        <button class="ctrl-btn replay-btn" onclick="replayVerse()" title="Réécouter">🔊</button>
        <button class="ctrl-btn speed-btn" onclick="toggleSpeed()" id="speed-btn" title="Vitesse">🐢</button>
        <button class="ctrl-btn next-btn" onclick="nextStep()" id="step-btn" title="Continuer">▶</button>
      </div>
    </div>
  </div>

  <!-- Barre de progression des étapes -->
  <div class="steps-bar">
    <div class="step-dot active" id="dot-1" title="Écoute">👂</div>
    <div class="step-dot" id="dot-2" title="Mot par mot">👆</div>
    <div class="step-dot" id="dot-3" title="Syllabes">🔤</div>
    <div class="step-dot" id="dot-4" title="Quiz">🎯</div>
    <div class="step-dot" id="dot-5" title="Révision">⭐</div>
  </div>

  <!-- Zone d'exercice (syllabation, quiz…) -->
  <div id="exercise-zone" class="exercise-zone hidden"></div>

</div>

<!-- ===== TABLEAU PASTEUR ===== -->
<div id="pastor-screen" class="screen">
  <div class="selector-header">
    <button class="back-btn" onclick="closePastorView()">←</button>
    <h2>Tableau du Pasteur</h2>
    <button class="export-btn" onclick="exportProgress()">💾 Exporter</button>
  </div>
  <div id="pastor-body" class="pastor-body"></div>
</div>

<!-- ===== OVERLAY FÉLICITATION ===== -->
<div id="congrats-overlay" class="congrats-overlay hidden">
  <div class="congrats-card">
    <div class="congrats-icon">🎉</div>
    <h2 id="congrats-title">Bravo !</h2>
    <p id="congrats-msg"></p>
    <div class="stars-row" id="congrats-stars"></div>
    <button class="cta-btn" onclick="continueAfterCongrats()">Continuer →</button>
  </div>
</div>

<!-- ===== TOAST MESSAGE ===== -->
<div id="toast" class="toast hidden"></div>

<script src="script.js"></script>
</body>
</html>
