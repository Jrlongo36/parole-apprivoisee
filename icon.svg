<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1650"/>
      <stop offset="100%" style="stop-color:#0F0C2E"/>
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F1C40F"/>
      <stop offset="100%" style="stop-color:#B8941A"/>
    </linearGradient>
  </defs>
  <!-- Fond -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Halo -->
  <circle cx="256" cy="200" r="130" fill="rgba(241,196,15,0.06)"/>
  <!-- Croix -->
  <rect x="236" y="80" width="40" height="240" rx="8" fill="url(#cross)"/>
  <rect x="150" y="140" width="212" height="40" rx="8" fill="url(#cross)"/>
  <!-- Texte -->
  <text x="256" y="390" font-family="Georgia,serif" font-size="42" font-weight="bold"
    fill="#F1C40F" text-anchor="middle" letter-spacing="1">La Parole</text>
  <text x="256" y="435" font-family="Georgia,serif" font-size="26"
    fill="rgba(241,196,15,0.6)" text-anchor="middle">Apprivoisée</text>
</svg>